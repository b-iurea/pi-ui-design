<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ui-design — pi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- ═══ TOP TOOLBAR ═══ -->
  <header id="topbar">
    <div class="tb-left">
      <button class="tb-btn" onclick="UI.tool('select')" data-tool="select" title="Move (V)"><i class="fa-regular fa-hand-pointer"></i></button>
      <button class="tb-btn" onclick="UI.tool('hand')" data-tool="hand" title="Hand (H)"><i class="fa-regular fa-hand"></i></button>
      <span class="tb-sep"></span>
      <button class="tb-btn" onclick="UI.tool('frame')" data-tool="frame" title="Frame (F)"><i class="fa-regular fa-square"></i></button>
      <button class="tb-btn" onclick="UI.tool('rect')" data-tool="rect" title="Rectangle (R)"><i class="fa-regular fa-square"></i></button>
      <button class="tb-btn" onclick="UI.tool('text')" data-tool="text" title="Text (T)"><i class="fa-regular fa-text-height"></i></button>
      <button class="tb-btn" onclick="UI.tool('ellipse')" data-tool="ellipse" title="Ellipse (O)"><i class="fa-regular fa-circle"></i></button>
      <button class="tb-btn" onclick="UI.tool('line')" data-tool="line" title="Line (L)"><i class="fa-regular fa-minus"></i></button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled><i class="fa-regular fa-arrow-rotate-left"></i></button>
      <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)" disabled><i class="fa-regular fa-arrow-rotate-right"></i></button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-duplicate" title="Duplicate (Ctrl+D)"><i class="fa-regular fa-copy"></i></button>
      <button class="tb-btn" id="btn-group" title="Group (Ctrl+G)"><i class="fa-regular fa-layer-group"></i></button>
      <button class="tb-btn" id="btn-ungroup" title="Ungroup (Ctrl+Shift+G)"><i class="fa-regular fa-layer-group"></i>⇤</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-comments" title="Comments"><i class="fa-regular fa-comment"></i></button>
    </div>
    <div class="tb-center">
      <div class="tc-group">
        <label>Primary <input type="color" id="theme-primary" value="#0d99ff"></label>
        <label>Bg <input type="color" id="theme-bg" value="#1e1e1e"></label>
        <label>Text <input type="color" id="theme-text" value="#ffffff"></label>
      </div>
      <div class="tc-group">
        <label>Spacing <select id="theme-spacing"><option>compact</option><option selected>normal</option><option>spacious</option></select></label>
        <label>Radius <select id="theme-radius"><option>none</option><option>sm</option><option selected>md</option><option>lg</option><option>xl</option></select></label>
      </div>
      <div class="tc-group">
        <label>Font <select id="theme-font"><option>Inter, sans-serif</option><option>'Georgia', serif</option><option>'Space Grotesk', sans-serif</option><option>'DM Sans', sans-serif</option><option>'JetBrains Mono', monospace</option></select></label>
        <label class="toggle-label"><input type="checkbox" id="theme-dark" checked> <i class="fa-regular fa-moon"></i></label>
      </div>
    </div>
    <div class="tb-right">
      <button class="tb-btn" onclick="UI.toggleCode()" title="Toggle code panel"><i class="fa-regular fa-code"></i></button>
      <button class="tb-btn" id="btn-export" title="Export"><i class="fa-regular fa-download"></i></button>
      <span class="badge">Ready</span>
    </div>
  </header>

  <!-- ═══ MAIN LAYOUT ═══ -->
  <div id="main">
    <!-- Left: Layers + Assets -->
    <aside id="sidebar-left">
      <div class="sb-tabs">
        <button class="sb-tab active" data-panel="layers"><i class="fa-regular fa-layer-group"></i> Layers</button>
        <button class="sb-tab" data-panel="assets"><i class="fa-regular fa-cube"></i> Assets</button>
      </div>
      <div id="panel-layers" class="sb-panel active">
        <div class="sb-search"><i class="fa-regular fa-search"></i> <input type="text" id="layer-search" placeholder="Search layers..."></div>
        <div id="layers-list"></div>
      </div>
      <div id="panel-assets" class="sb-panel">
        <div class="sb-search"><i class="fa-regular fa-search"></i> <input type="text" id="palette-search" placeholder="Search components..."></div>
        <div id="palette-categories"></div>
      </div>
    </aside>

    <!-- Center: Canvas -->
    <div id="center">
      <div id="canvas-container">
        <!-- Floating coordinate display -->
        <div id="coord-display" class="floating-label top-left"><span id="zoom-label">100%</span></div>
        <!-- The actual canvas transform layer -->
        <div id="canvas-layer">
          <div id="canvas-content">
            <div id="canvas-empty">Drop components here</div>
            <div id="canvas-list"></div>
            <!-- Snap guides rendered as positioned divs -->
            <div id="snap-guides"></div>
            <!-- Marquee selection rect -->
            <div id="marquee" style="display:none"></div>
            <!-- Resize handles rendered per-selection -->
            <div id="resize-handles" style="display:none"></div>
          </div>
        </div>
        <!-- Drop zone overlay for palette drag -->
        <div class="canvas-childzone" data-parent="root" style="position:absolute;bottom:0;left:0;right:0;height:40px;border:1px dashed var(--border-d);border-radius:6px;display:none;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);margin:4px;opacity:.4" id="canvas-drop-zone">Drop here</div>
      </div>
    </div>

    <!-- Right: Inspector + Code + Comments -->
    <aside id="sidebar-right">
      <div class="sb-tabs">
        <button class="sb-tab active" data-panel="inspector"><i class="fa-regular fa-pen-to-square"></i> Design</button>
        <button class="sb-tab" data-panel="code-output-panel"><i class="fa-regular fa-code"></i> Code</button>
        <button class="sb-tab" data-panel="comments"><i class="fa-regular fa-comment-dots"></i> Comments</button>
      </div>
      <!-- Inspector -->
      <div id="panel-inspector" class="sb-panel active">
        <div id="inspector-content"><p class="muted">Select a component</p></div>
      </div>
      <!-- Code -->
      <div id="panel-code-output-panel" class="sb-panel">
        <div class="code-controls">
          <select id="code-format"><option value="html">HTML+CSS</option><option value="react">React JSX</option><option value="tailwind">Tailwind</option><option value="vue">Vue</option><option value="svelte">Svelte</option><option value="angular">Angular</option></select>
          <select id="code-style"><option value="inline">Inline styles</option><option value="cssmodules">CSS Modules</option><option value="styled">Styled Components</option></select>
          <button class="btn-sm" id="btn-copy"><i class="fa-regular fa-copy"></i></button>
        </div>
        <pre id="code-output"><code>&lt;!-- Add components --&gt;</code></pre>
        <div id="preview-frame-container" style="display:none;flex:1;overflow:hidden;border-top:1px solid var(--border)">
          <iframe id="preview-frame" sandbox="allow-scripts" style="width:100%;height:100%;border:none;background:#fff"></iframe>
        </div>
      </div>
      <!-- Comments -->
      <div id="panel-comments" class="sb-panel">
        <div class="sb-search"><i class="fa-regular fa-plus"></i> <input type="text" id="comment-input" placeholder="Add a comment..."></div>
        <div id="comments-list"></div>
      </div>
    </aside>
  </div>

  <!-- ═══ BOTTOM BAR ═══ -->
  <footer id="bottombar">
    <div class="bb-left">
      <span id="component-count">0 components</span>
      <span id="save-status"><i class="fa-regular fa-floppy-disk"></i> Auto</span>
    </div>
    <div class="bb-center">
      <button class="btn-sm" onclick="UI.zoomTo(1)">100%</button>
      <button class="btn-sm" onclick="UI.zoomTo(0)">Fit</button>
      <button class="btn-sm" onclick="UI.zoomTo(2)">200%</button>
    </div>
    <div class="bb-right">
      <button class="btn-sm" id="btn-snapshots" title="Snapshots"><i class="fa-regular fa-clock-rotate-left"></i> History</button>
      <button class="btn-sm" id="btn-clear" title="Clear all"><i class="fa-regular fa-trash-can"></i></button>
    </div>
  </footer>
</div>

<!-- Offscreen textarea for clipboard fallback -->
<textarea id="copy-buffer" style="position:fixed;left:-9999px;top:0"></textarea>

<!-- Snapshots modal (hidden by default) -->
<div id="snapshots-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-hdr"><span>Snapshots</span><button onclick="UI.closeSnapshots()" class="btn-sm"><i class="fa-regular fa-xmark"></i></button></div>
    <div class="modal-body" id="snapshots-list"></div>
  </div>
</div>

<script src="dist/app.js"></script>
</body>
</html>
